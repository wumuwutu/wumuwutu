<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" width="600" height="440">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="600" height="440" fill="#050510"/>

  <!-- outer border glow -->
  <rect x="0" y="0" width="600" height="440" fill="none" stroke="#4a00e0" stroke-width="4" filter="url(#glow-strong)" rx="4"/>

  <!-- title -->
  <text x="300" y="35" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#00fff5" filter="url(#glow)" letter-spacing="3">PIXEL MAZE</text>
  <text x="300" y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#ff6b9d" letter-spacing="2">CAN YOU FIND THE PATH?</text>

  <!-- entrance marker -->
  <text x="40" y="85" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#39ff14" filter="url(#glow)">IN</text>
  <!-- exit marker -->
  <text x="560" y="415" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#ff0055" filter="url(#glow)">OUT</text>

  <!-- character at entrance -->
  <rect x="32" y="92" width="16" height="16" fill="#1a1a3e" rx="2"/>
  <rect x="35" y="95" width="4" height="3" fill="#00fff5" filter="url(#glow)"/>
  <rect x="41" y="95" width="4" height="3" fill="#00fff5" filter="url(#glow)"/>
  <rect x="36" y="101" width="8" height="2" fill="#ff0055"/>

  <!-- exit portal -->
  <rect x="548" y="388" width="24" height="24" fill="none" stroke="#ff0055" stroke-width="2" filter="url(#glow-strong)" rx="12"/>
  <rect x="554" y="394" width="12" height="12" fill="#ff0055" opacity="0.6" rx="6"/>

  <!-- walls - row 0 (top) -->
  <rect x="20" y="60" width="560" height="20" fill="#1a1a3e"/>

  <!-- walls - row 10 (bottom) -->
  <rect x="20" y="400" width="560" height="20" fill="#1a1a3e"/>

  <!-- walls - left/right borders -->
  <rect x="20" y="60" width="20" height="360" fill="#1a1a3e"/>
  <rect x="560" y="60" width="20" height="360" fill="#1a1a3e"/>

  <!-- internal walls -->
  <rect x="100" y="100" width="20" height="80" fill="#1a1a3e"/>
  <rect x="180" y="100" width="20" height="40" fill="#1a1a3e"/>
  <rect x="260" y="80" width="20" height="80" fill="#1a1a3e"/>
  <rect x="340" y="100" width="20" height="60" fill="#1a1a3e"/>
  <rect x="460" y="80" width="20" height="60" fill="#1a1a3e"/>
  <rect x="540" y="100" width="20" height="40" fill="#1a1a3e"/>

  <rect x="60" y="180" width="100" height="20" fill="#1a1a3e"/>
  <rect x="180" y="160" width="20" height="80" fill="#1a1a3e"/>
  <rect x="260" y="180" width="80" height="20" fill="#1a1a3e"/>
  <rect x="380" y="160" width="20" height="80" fill="#1a1a3e"/>
  <rect x="460" y="180" width="100" height="20" fill="#1a1a3e"/>

  <rect x="60" y="260" width="20" height="60" fill="#1a1a3e"/>
  <rect x="140" y="240" width="20" height="80" fill="#1a1a3e"/>
  <rect x="220" y="260" width="60" height="20" fill="#1a1a3e"/>
  <rect x="300" y="220" width="20" height="100" fill="#1a1a3e"/>
  <rect x="380" y="260" width="80" height="20" fill="#1a1a3e"/>
  <rect x="500" y="240" width="20" height="80" fill="#1a1a3e"/>

  <rect x="100" y="340" width="100" height="20" fill="#1a1a3e"/>
  <rect x="220" y="320" width="20" height="80" fill="#1a1a3e"/>
  <rect x="300" y="340" width="20" height="60" fill="#1a1a3e"/>
  <rect x="380" y="340" width="80" height="20" fill="#1a1a3e"/>
  <rect x="500" y="320" width="20" height="60" fill="#1a1a3e"/>

  <!-- path hints (subtle dots along the solution path) -->
  <circle cx="50" cy="130" r="2" fill="#00fff5" opacity="0.15"/>
  <circle cx="50" cy="170" r="2" fill="#00fff5" opacity="0.15"/>
  <circle cx="50" cy="210" r="2" fill="#00fff5" opacity="0.15"/>
  <circle cx="50" cy="250" r="2" fill="#00fff5" opacity="0.15"/>
  <circle cx="50" cy="290" r="2" fill="#00fff5" opacity="0.15"/>
  <circle cx="50" cy="330" r="2" fill="#00fff5" opacity="0.15"/>
  <circle cx="50" cy="370" r="2" fill="#00fff5" opacity="0.15"/>

  <!-- footer text -->
  <text x="300" y="435" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#4a4a6a" letter-spacing="1">TRACE THE PATH FROM IN TO OUT</text>
</svg>
