<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="50%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-intense">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow-green">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow-cyan">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes blink { 0%,49% { opacity:1 } 50%,100% { opacity:0 } }
      .cursor { animation: blink 1s infinite }
    </style>
  </defs>

  <!-- ═══ CITYSCAPE ═══ -->
  <rect width="800" height="280" fill="url(#sky)"/>

  <!-- stars -->
  <rect x="50" y="20" width="2" height="2" fill="#fff" opacity="0.9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" repeatCount="indefinite"/></rect>
  <rect x="120" y="45" width="2" height="2" fill="#fff" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.5s" repeatCount="indefinite"/></rect>
  <rect x="200" y="15" width="3" height="3" fill="#00fff5" opacity="0.8"><animate attributeName="opacity" values="0.8;0.15;0.8" dur="1.8s" repeatCount="indefinite"/></rect>
  <rect x="300" y="55" width="2" height="2" fill="#fff" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/></rect>
  <rect x="380" y="25" width="2" height="2" fill="#ff6b9d" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.2s" repeatCount="indefinite"/></rect>
  <rect x="450" y="40" width="3" height="3" fill="#fff" opacity="0.9"><animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.5s" repeatCount="indefinite"/></rect>
  <rect x="550" y="18" width="2" height="2" fill="#00fff5" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/></rect>
  <rect x="620" y="50" width="2" height="2" fill="#fff" opacity="0.8"><animate attributeName="opacity" values="0.8;0.15;0.8" dur="2s" repeatCount="indefinite"/></rect>
  <rect x="700" y="30" width="3" height="3" fill="#ff6b9d" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.2s" repeatCount="indefinite"/></rect>
  <rect x="160" y="70" width="2" height="2" fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.7s" repeatCount="indefinite"/></rect>
  <rect x="480" y="65" width="2" height="2" fill="#fff" opacity="0.7"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="1.9s" repeatCount="indefinite"/></rect>
  <rect x="340" y="35" width="2" height="2" fill="#ffd700" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.4s" repeatCount="indefinite"/></rect>
  <rect x="650" y="15" width="2" height="2" fill="#fff" opacity="0.9"><animate attributeName="opacity" values="0.9;0.1;0.9" dur="1.6s" repeatCount="indefinite"/></rect>
  <rect x="750" y="55" width="2" height="2" fill="#00fff5" opacity="0.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.3s" repeatCount="indefinite"/></rect>
  <rect x="80" y="60" width="2" height="2" fill="#ffd700" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="3.1s" repeatCount="indefinite"/></rect>
  <rect x="580" y="40" width="2" height="2" fill="#fff" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.1s" repeatCount="indefinite"/></rect>
  <rect x="250" y="25" width="2" height="2" fill="#fff" opacity="0.9"><animate attributeName="opacity" values="0.9;0.15;0.9" dur="1.7s" repeatCount="indefinite"/></rect>
  <rect x="420" y="12" width="2" height="2" fill="#00fff5" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.6s" repeatCount="indefinite"/></rect>

  <!-- moon bouncing -->
  <g><circle cx="680" cy="50" r="20" fill="#ffd700" opacity="0.9"/><circle cx="690" cy="45" r="18" fill="#050510"/><animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="3s" repeatCount="indefinite"/></g>

  <!-- buildings -->
  <rect x="0" y="140" width="50" height="140" fill="#0d0d20"/>
  <rect x="55" y="120" width="40" height="160" fill="#0d0d20"/>
  <rect x="100" y="150" width="60" height="130" fill="#0d0d20"/>
  <rect x="200" y="110" width="35" height="170" fill="#0d0d20"/>
  <rect x="280" y="130" width="50" height="150" fill="#0d0d20"/>
  <rect x="370" y="100" width="40" height="180" fill="#0d0d20"/>
  <rect x="450" y="140" width="55" height="140" fill="#0d0d20"/>
  <rect x="540" y="115" width="35" height="165" fill="#0d0d20"/>
  <rect x="610" y="135" width="50" height="145" fill="#0d0d20"/>
  <rect x="700" y="105" width="45" height="175" fill="#0d0d20"/>
  <rect x="755" y="145" width="45" height="135" fill="#0d0d20"/>
  <rect x="20" y="160" width="70" height="120" fill="#111128"/>
  <rect x="130" y="130" width="50" height="150" fill="#111128"/>
  <rect x="190" y="145" width="65" height="135" fill="#111128"/>
  <rect x="310" y="120" width="45" height="160" fill="#111128"/>
  <rect x="400" y="150" width="60" height="130" fill="#111128"/>
  <rect x="490" y="125" width="40" height="155" fill="#111128"/>
  <rect x="560" y="155" width="55" height="125" fill="#111128"/>
  <rect x="650" y="130" width="45" height="150" fill="#111128"/>

  <!-- flickering windows -->
  <rect x="30" y="170" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.2;1;1;0.3;1" dur="4s" repeatCount="indefinite"/></rect>
  <rect x="40" y="180" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></rect>
  <rect x="50" y="190" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.2;1" dur="3.5s" repeatCount="indefinite"/></rect>
  <rect x="140" y="145" width="4" height="4" fill="#ff6b9d" filter="url(#glow)"><animate attributeName="opacity" values="1;0.15;1;1;0.4;1" dur="4.5s" repeatCount="indefinite"/></rect>
  <rect x="155" y="155" width="4" height="4" fill="#ff6b9d" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></rect>
  <rect x="160" y="165" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.2;1" dur="3.2s" repeatCount="indefinite"/></rect>
  <rect x="205" y="160" width="4" height="4" fill="#ffd700" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1;1;0.15;1" dur="5.5s" repeatCount="indefinite"/></rect>
  <rect x="220" y="175" width="4" height="4" fill="#ffd700" filter="url(#glow)"><animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite"/></rect>
  <rect x="235" y="165" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.15;1" dur="2.5s" repeatCount="indefinite"/></rect>
  <rect x="320" y="140" width="4" height="4" fill="#ff6b9d" filter="url(#glow)"><animate attributeName="opacity" values="1;0.2;1;1;0.35;1" dur="3.8s" repeatCount="indefinite"/></rect>
  <rect x="335" y="155" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="4.2s" repeatCount="indefinite"/></rect>
  <rect x="320" y="170" width="4" height="4" fill="#ffd700" filter="url(#glow)"><animate attributeName="opacity" values="1;0.15;1" dur="3s" repeatCount="indefinite"/></rect>
  <rect x="415" y="165" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.2;1;1;0.25;1" dur="5s" repeatCount="indefinite"/></rect>
  <rect x="430" y="180" width="4" height="4" fill="#ff6b9d" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="3.5s" repeatCount="indefinite"/></rect>
  <rect x="445" y="170" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.15;1" dur="4.5s" repeatCount="indefinite"/></rect>
  <rect x="500" y="140" width="4" height="4" fill="#ffd700" filter="url(#glow)"><animate attributeName="opacity" values="1;0.25;1;1;0.1;1" dur="3.3s" repeatCount="indefinite"/></rect>
  <rect x="510" y="155" width="4" height="4" fill="#ff6b9d" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/></rect>
  <rect x="570" y="170" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.2;1" dur="4.8s" repeatCount="indefinite"/></rect>
  <rect x="585" y="180" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.15;1;1;0.3;1" dur="3.6s" repeatCount="indefinite"/></rect>
  <rect x="660" y="145" width="4" height="4" fill="#ff6b9d" filter="url(#glow)"><animate attributeName="opacity" values="1;0.2;1" dur="5.2s" repeatCount="indefinite"/></rect>
  <rect x="675" y="160" width="4" height="4" fill="#ffd700" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="2.9s" repeatCount="indefinite"/></rect>
  <rect x="660" y="175" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.15;1" dur="4.1s" repeatCount="indefinite"/></rect>
  <rect x="710" y="120" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.25;1;1;0.2;1" dur="3.4s" repeatCount="indefinite"/></rect>
  <rect x="725" y="135" width="4" height="4" fill="#ff6b9d" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="4.7s" repeatCount="indefinite"/></rect>
  <rect x="765" y="160" width="4" height="4" fill="#ffd700" filter="url(#glow)"><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/></rect>
  <rect x="780" y="175" width="4" height="4" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.15;1;1;0.3;1" dur="2.6s" repeatCount="indefinite"/></rect>

  <!-- antenna lights -->
  <rect x="212" y="108" width="3" height="3" fill="#ff0055" filter="url(#glow-strong)"><animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/></rect>
  <rect x="382" y="98" width="3" height="3" fill="#ff0055" filter="url(#glow-strong)"><animate attributeName="opacity" values="1;0.15;1" dur="1.2s" repeatCount="indefinite"/></rect>
  <rect x="712" y="103" width="3" height="3" fill="#ff0055" filter="url(#glow-strong)"><animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/></rect>

  <!-- character -->
  <g>
    <rect x="384" y="90" width="4" height="4" fill="#1a1a3e"/>
    <rect x="388" y="86" width="8" height="4" fill="#1a1a3e"/>
    <rect x="396" y="90" width="4" height="4" fill="#1a1a3e"/>
    <rect x="392" y="86" width="4" height="4" fill="#2a2a5e"/>
    <rect x="388" y="90" width="8" height="8" fill="#c0c0d0"/>
    <rect x="388" y="92" width="3" height="2" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></rect>
    <rect x="393" y="92" width="3" height="2" fill="#00fff5" filter="url(#glow)"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></rect>
    <rect x="386" y="98" width="12" height="12" fill="#1a1a3e"/>
    <rect x="384" y="100" width="4" height="8" fill="#1a1a3e"/>
    <rect x="396" y="100" width="4" height="8" fill="#1a1a3e"/>
    <rect x="386" y="98" width="12" height="3" fill="#ff0055"/>
    <rect x="396" y="101" width="4" height="6" fill="#ff0055"><animate attributeName="height" values="6;8;6" dur="2s" repeatCount="indefinite"/></rect>
    <rect x="388" y="110" width="4" height="6" fill="#111128"/>
    <rect x="394" y="110" width="4" height="6" fill="#111128"/>
  </g>

  <!-- ground -->
  <rect x="0" y="260" width="800" height="20" fill="#0a0a1a"/>
  <rect x="0" y="260" width="800" height="2" fill="#4a00e0" opacity="0.5"/>
  <rect x="30" y="262" width="6" height="2" fill="#00fff5" opacity="0.3"><animate attributeName="opacity" values="0.3;0.08;0.3" dur="3s" repeatCount="indefinite"/></rect>
  <rect x="140" y="262" width="6" height="2" fill="#ff6b9d" opacity="0.3"><animate attributeName="opacity" values="0.3;0.08;0.3" dur="4s" repeatCount="indefinite"/></rect>
  <rect x="320" y="262" width="6" height="2" fill="#ffd700" opacity="0.3"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="3.5s" repeatCount="indefinite"/></rect>
  <rect x="500" y="262" width="6" height="2" fill="#00fff5" opacity="0.3"><animate attributeName="opacity" values="0.3;0.08;0.3" dur="2.5s" repeatCount="indefinite"/></rect>
  <rect x="660" y="262" width="6" height="2" fill="#ff6b9d" opacity="0.3"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="4.5s" repeatCount="indefinite"/></rect>

  <!-- username on cityscape (rainbow pixel style) -->
  <text x="400" y="250" text-anchor="middle" font-family="'Courier New',monospace" font-size="24" font-weight="bold" filter="url(#glow-intense)" letter-spacing="6">
    <tspan fill="#ff0055">W</tspan><tspan fill="#ff6b00">U</tspan><tspan fill="#ffd700">M</tspan><tspan fill="#39ff14">U</tspan><tspan fill="#00fff5">W</tspan><tspan fill="#4a00e0">U</tspan><tspan fill="#ff6b9d">T</tspan><tspan fill="#ff0055">U</tspan>
  </text>

  <!-- ═══ TEXT SECTION BELOW CITYSCAPE ═══ -->

  <!-- background for text area -->
  <rect x="0" y="280" width="800" height="200" fill="#050510"/>

  <!-- boot sequence text -->
  <text x="400" y="320" text-anchor="middle" font-family="'Courier New',monospace" font-size="16" font-weight="bold" fill="#39ff14" filter="url(#text-glow-green)" letter-spacing="2">&gt; SYSTEM BOOT SEQUENCE INITIATED</text>
  <text class="cursor" x="595" y="320" font-family="'Courier New',monospace" font-size="16" fill="#39ff14">_</text>

  <!-- scan lines -->
  <text x="400" y="345" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#00fff5" filter="url(#text-glow-cyan)" opacity="0.9">LOADING CHARACTER DATA...</text>
  <text x="400" y="363" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#00fff5" filter="url(#text-glow-cyan)" opacity="0.7">SCANNING NEURAL LINK...</text>
  <text x="400" y="381" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#00fff5" filter="url(#text-glow-cyan)" opacity="0.5">DECRYPTING IDENTITY...</text>
  <text x="400" y="399" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#ff0055" filter="url(#text-glow-cyan)">ACCESS LEVEL: UNKNOWN</text>

  <text x="400" y="440" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" font-weight="bold" letter-spacing="2" filter="url(#glow)">
    <tspan fill="#ff0055">&gt;</tspan><tspan fill="#ffd700"> </tspan><tspan fill="#ff6b9d">P</tspan><tspan fill="#ffd700">I</tspan><tspan fill="#39ff14">X</tspan><tspan fill="#00fff5">E</tspan><tspan fill="#4a00e0">L</tspan><tspan fill="#ffd700"> </tspan><tspan fill="#ff0055">C</tspan><tspan fill="#ff6b9d">R</tspan><tspan fill="#ffd700">U</tspan><tspan fill="#39ff14">S</tspan><tspan fill="#00fff5">H</tspan><tspan fill="#ffd700"> </tspan><tspan fill="#ff0055">&lt;</tspan>
  </text>

  <!-- divider line -->
  <line x1="100" y1="460" x2="700" y2="460" stroke="url(#sky)" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="460" x2="300" y2="460" stroke="#4a00e0" stroke-width="2" filter="url(#glow)"/>
  <line x1="300" y1="460" x2="500" y2="460" stroke="#ff0055" stroke-width="2" filter="url(#glow)"/>
  <line x1="500" y1="460" x2="700" y2="460" stroke="#00fff5" stroke-width="2" filter="url(#glow)"/>

</svg>
